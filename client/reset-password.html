<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hang Out — Réinitialisation mot de passe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:radial-gradient(ellipse at 60% 40%,#2a1f5e 0%,#111214 60%); }
    .card { width:100%;max-width:400px;background:var(--bg-secondary,#2b2d31);border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:slideUp 400ms ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none} }
    h1 { font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#f2f3f5;margin-bottom:6px; }
    h1 span { color:#5865F2; }
    .subtitle { font-size:14px;color:#80848e;margin-bottom:24px; }
    .input-group { margin-bottom:16px; }
    .input-group label { display:block;font-size:12px;font-weight:700;color:#b5bac1;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px; }
    .input { width:100%;padding:10px 12px;background:#1e1f22;border:1px solid rgba(255,255,255,.06);border-radius:6px;font-size:15px;color:#f2f3f5;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box; }
    .input:focus { border-color:#5865F2; }
    .btn { width:100%;padding:12px;border-radius:8px;background:#5865F2;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 150ms; }
    .btn:hover { background:#4752c4; }
    .btn:disabled { opacity:.6;pointer-events:none; }
    .msg { font-size:13px;text-align:center;margin-top:12px;min-height:18px; }
    .msg.error { color:#ed4245; }
    .msg.success { color:#3ba55c; }
    .back { text-align:center;margin-top:16px;font-size:13px; }
    .back a { color:#5865F2;text-decoration:none; }
    .back a:hover { text-decoration:underline; }
    .strength-bar { height:4px;border-radius:2px;background:var(--border,rgba(255,255,255,.1));margin-top:6px;overflow:hidden; }
    .strength-fill { height:100%;border-radius:2px;transition:width 200ms,background 200ms;width:0 }
  </style>
</head>
<body>
<div class="card">
  <h1>Hang <span>Out</span></h1>

  <!-- Formulaire demande de reset -->
  <div id="forgot-form">
    <p class="subtitle">Saisis ton email pour recevoir un lien de réinitialisation.</p>
    <div class="input-group">
      <label>Email</label>
      <input id="forgot-email" class="input" type="email" placeholder="ton@email.com" autocomplete="email" />
    </div>
    <button class="btn" id="forgot-btn">Envoyer le lien</button>
    <p class="msg" id="forgot-msg"></p>
  </div>

  <!-- Formulaire nouveau mot de passe (si token présent) -->
  <div id="reset-form" style="display:none">
    <p class="subtitle">Choisis ton nouveau mot de passe.</p>
    <div class="input-group">
      <label>Nouveau mot de passe</label>
      <input id="new-pwd" class="input" type="password" placeholder="••••••••" autocomplete="new-password" />
      <div class="strength-bar"><div class="strength-fill" id="pwd-strength"></div></div>
    </div>
    <div class="input-group">
      <label>Confirmer</label>
      <input id="confirm-pwd" class="input" type="password" placeholder="••••••••" autocomplete="new-password" />
    </div>
    <button class="btn" id="reset-btn">Changer le mot de passe</button>
    <p class="msg" id="reset-msg"></p>
  </div>

  <!-- Succès -->
  <div id="success-view" style="display:none;text-align:center;padding:16px 0">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <div style="font-size:16px;font-weight:600;color:#f2f3f5;margin-bottom:8px">Mot de passe modifié !</div>
    <div style="font-size:14px;color:#80848e">Tu peux maintenant te connecter.</div>
  </div>

  <div class="back"><a href="/">← Retour à la connexion</a></div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');

// Afficher le bon formulaire selon la présence du token
if (token) {
  document.getElementById('forgot-form').style.display = 'none';
  document.getElementById('reset-form').style.display = 'block';
}

// ── Indicateur de force du mot de passe ──────────────────
document.getElementById('new-pwd')?.addEventListener('input', (e) => {
  const val = e.target.value;
  const bar = document.getElementById('pwd-strength');
  if (!bar) return;
  let strength = 0;
  if (val.length >= 8) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const colors = ['#ed4245','#faa61a','#3ba55c','#3ba55c'];
  const widths  = ['25%','50%','75%','100%'];
  bar.style.width      = val.length ? widths[Math.max(0,strength-1)] : '0';
  bar.style.background = val.length ? colors[Math.max(0,strength-1)] : '';
});

// ── Envoi demande de reset ────────────────────────────────
document.getElementById('forgot-btn')?.addEventListener('click', async () => {
  const email  = document.getElementById('forgot-email').value.trim();
  const msgEl  = document.getElementById('forgot-msg');
  const btn    = document.getElementById('forgot-btn');
  msgEl.className = 'msg';

  if (!email) { msgEl.textContent = 'Email requis'; msgEl.className = 'msg error'; return; }

  btn.disabled = true;
  btn.textContent = 'Envoi…';
  try {
    const res  = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    // Toujours afficher le même message (sécurité anti-enumeration)
    msgEl.textContent = 'Si cet email existe, un lien de réinitialisation a été envoyé.';
    msgEl.className = 'msg success';
    document.getElementById('forgot-email').value = '';
  } catch (_) {
    msgEl.textContent = 'Si cet email existe, un lien de réinitialisation a été envoyé.';
    msgEl.className = 'msg success';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
  }
});

document.getElementById('forgot-email')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('forgot-btn')?.click();
});

// ── Nouveau mot de passe ──────────────────────────────────
document.getElementById('reset-btn')?.addEventListener('click', async () => {
  const pwd     = document.getElementById('new-pwd').value;
  const confirm = document.getElementById('confirm-pwd').value;
  const msgEl   = document.getElementById('reset-msg');
  const btn     = document.getElementById('reset-btn');
  msgEl.className = 'msg';

  if (pwd.length < 6)   { msgEl.textContent = 'Mot de passe trop court (6 min)'; msgEl.className = 'msg error'; return; }
  if (pwd !== confirm)  { msgEl.textContent = 'Les mots de passe ne correspondent pas'; msgEl.className = 'msg error'; return; }

  btn.disabled = true;
  btn.textContent = 'Modification…';
  try {
    const res  = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
    setTimeout(() => location.href = '/', 2500);
  } catch (err) {
    msgEl.textContent = err.message;
    msgEl.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Changer le mot de passe';
  }
});
</script>
</body>
</html>
