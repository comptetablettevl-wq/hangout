<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hang Out — Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      background: radial-gradient(ellipse at 60% 40%, #2a1f5e 0%, #111214 60%);
    }
    .card {
      width: 100%; max-width: 440px;
      background: var(--bg-secondary, #2b2d31);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 400ms cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    .banner {
      height: 120px;
      background: linear-gradient(135deg, #5865F2, #7289da);
      position: relative; overflow: hidden;
    }
    .banner img { width:100%; height:100%; object-fit:cover; }
    .body { padding: 0 24px 24px; }
    .avatar-wrap {
      margin-top: -36px; margin-bottom: 12px;
      width: 72px; height: 72px;
      border-radius: 16px; border: 5px solid var(--bg-secondary, #2b2d31);
      background: #5865F2;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: #fff;
      overflow: hidden; position: relative;
    }
    .avatar-wrap img { width:100%; height:100%; object-fit:cover; }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#f2f3f5; margin-bottom:4px; }
    .desc { font-size:14px; color:#b5bac1; margin-bottom:12px; line-height:1.5; }
    .members { font-size:13px; color:#80848e; margin-bottom:20px; display:flex; align-items:center; gap:6px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#3ba55c; flex-shrink:0; }
    .btn-join {
      width:100%; padding:13px; border-radius:8px;
      background:#5865F2; color:#fff; border:none;
      font-size:16px; font-weight:600; cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition: background 150ms, transform 100ms;
    }
    .btn-join:hover { background:#4752c4; }
    .btn-join:active { transform:scale(0.98); }
    .btn-join:disabled { opacity:0.6; pointer-events:none; }
    .error-msg { color:#ed4245; font-size:13px; text-align:center; margin-top:10px; min-height:18px; }
    .footer { text-align:center; margin-top:16px; font-size:13px; color:#80848e; }
    .footer a { color:#5865F2; text-decoration:none; }
    .footer a:hover { text-decoration:underline; }
    .skeleton { background:linear-gradient(90deg,#383a40 25%,#424448 50%,#383a40 75%); background-size:200%; animation:shimmer 1.5s infinite; border-radius:6px; }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    #app { padding: 24px; }
  </style>
</head>
<body>
<div id="app">
  <div class="card">
    <div class="banner skeleton" id="banner-el" style="height:120px"></div>
    <div class="body">
      <div class="avatar-wrap skeleton" id="icon-el" style="width:72px;height:72px"></div>
      <h1 id="name-el" class="skeleton" style="width:160px;height:26px;margin-bottom:8px">&nbsp;</h1>
      <p class="desc skeleton" id="desc-el" style="height:40px">&nbsp;</p>
      <div class="members" id="members-el"></div>
      <button class="btn-join" id="join-btn" disabled>Rejoindre le serveur</button>
      <p class="error-msg" id="err-msg"></p>
    </div>
  </div>
  <div class="footer">
    <a href="/">Déjà membre ? Se connecter</a>
  </div>
</div>

<script>
const code = new URLSearchParams(location.search).get('invite') || location.pathname.split('/').pop();

const TOKEN = localStorage.getItem('ho_token');

(async () => {
  if (!code) { document.getElementById('err-msg').textContent = 'Code d\'invitation manquant'; return; }

  try {
    const res  = await fetch(`/api/servers/invite/${code}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    // Bannière
    const bannerEl = document.getElementById('banner-el');
    bannerEl.classList.remove('skeleton');
    if (data.banner) bannerEl.innerHTML = `<img src="${data.banner}" alt="bannière" />`;
    else bannerEl.style.background = 'linear-gradient(135deg,#5865F2,#7289da)';

    // Icône
    const iconEl = document.getElementById('icon-el');
    iconEl.classList.remove('skeleton');
    if (data.icon) {
      iconEl.innerHTML = `<img src="${data.icon}" alt="${data.name}" />`;
    } else {
      iconEl.style.background = '#5865F2';
      iconEl.textContent = data.name.slice(0,2).toUpperCase();
    }

    // Nom
    const nameEl = document.getElementById('name-el');
    nameEl.classList.remove('skeleton');
    nameEl.style.width = nameEl.style.height = '';
    nameEl.textContent = data.name;
    document.title = `Hang Out — Rejoindre ${data.name}`;

    // Description
    const descEl = document.getElementById('desc-el');
    descEl.classList.remove('skeleton');
    descEl.style.height = '';
    descEl.textContent = data.description || 'Rejoins ce serveur sur Hang Out !';

    // Membres
    document.getElementById('members-el').innerHTML =
      `<span class="dot"></span><strong style="color:#f2f3f5">${data.member_count}</strong>&nbsp;membre${data.member_count > 1 ? 's' : ''}`;

    // Bouton rejoindre
    const btn = document.getElementById('join-btn');
    btn.disabled = false;
    btn.onclick = async () => {
      if (!TOKEN) {
        // Rediriger vers login avec l'invitation en mémoire
        sessionStorage.setItem('pending_invite', code);
        location.href = `/?invite=${code}`;
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Connexion au serveur…';
      try {
        const r = await fetch(`/api/servers/join/${code}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        location.href = '/';
      } catch (err) {
        document.getElementById('err-msg').textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Rejoindre le serveur';
      }
    };
  } catch (err) {
    document.getElementById('err-msg').textContent = err.message;
    document.getElementById('banner-el').classList.remove('skeleton');
    document.getElementById('icon-el').classList.remove('skeleton');
    document.getElementById('name-el').textContent = 'Invitation invalide';
    document.getElementById('desc-el').textContent = 'Ce lien d\'invitation est expiré ou incorrect.';
  }
})();
</script>
</body>
</html>
